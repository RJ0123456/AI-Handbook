<svg xmlns="http://www.w3.org/2000/svg" width="720" height="310" viewBox="0 0 720 310">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="360" y="22" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#222">Dropout: Standard Network vs. Network with Dropout (p = 0.5)</text>

  <!-- ===== LEFT: Standard Network ===== -->
  <text x="160" y="46" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Standard Network</text>

  <!-- Input layer x1,x2,x3 -->
  <circle cx="52" cy="100" r="16" fill="#fff" stroke="#555" stroke-width="1.8"/>
  <text x="52" y="105" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">x₁</text>
  <circle cx="52" cy="160" r="16" fill="#fff" stroke="#555" stroke-width="1.8"/>
  <text x="52" y="165" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">x₂</text>
  <circle cx="52" cy="220" r="16" fill="#fff" stroke="#555" stroke-width="1.8"/>
  <text x="52" y="225" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">x₃</text>

  <!-- Hidden layer h1..h4 -->
  <circle cx="175" cy="80"  r="16" fill="#bbdefb" stroke="#1976d2" stroke-width="1.8"/>
  <text x="175" y="85"  text-anchor="middle" font-family="Arial" font-size="11" fill="#1a237e">h₁</text>
  <circle cx="175" cy="133" r="16" fill="#bbdefb" stroke="#1976d2" stroke-width="1.8"/>
  <text x="175" y="138" text-anchor="middle" font-family="Arial" font-size="11" fill="#1a237e">h₂</text>
  <circle cx="175" cy="186" r="16" fill="#bbdefb" stroke="#1976d2" stroke-width="1.8"/>
  <text x="175" y="191" text-anchor="middle" font-family="Arial" font-size="11" fill="#1a237e">h₃</text>
  <circle cx="175" cy="240" r="16" fill="#bbdefb" stroke="#1976d2" stroke-width="1.8"/>
  <text x="175" y="245" text-anchor="middle" font-family="Arial" font-size="11" fill="#1a237e">h₄</text>

  <!-- Output y -->
  <circle cx="298" cy="160" r="16" fill="#c8e6c9" stroke="#388e3c" stroke-width="1.8"/>
  <text x="298" y="165" text-anchor="middle" font-family="Arial" font-size="11" fill="#1b5e20">y</text>

  <!-- Input→Hidden edges -->
  <line x1="68" y1="100" x2="159" y2="84"  stroke="#aaa" stroke-width="1"/>
  <line x1="68" y1="100" x2="159" y2="137" stroke="#aaa" stroke-width="1"/>
  <line x1="68" y1="100" x2="159" y2="190" stroke="#aaa" stroke-width="1"/>
  <line x1="68" y1="100" x2="159" y2="243" stroke="#aaa" stroke-width="1"/>
  <line x1="68" y1="160" x2="159" y2="84"  stroke="#aaa" stroke-width="1"/>
  <line x1="68" y1="160" x2="159" y2="137" stroke="#aaa" stroke-width="1"/>
  <line x1="68" y1="160" x2="159" y2="190" stroke="#aaa" stroke-width="1"/>
  <line x1="68" y1="160" x2="159" y2="243" stroke="#aaa" stroke-width="1"/>
  <line x1="68" y1="220" x2="159" y2="84"  stroke="#aaa" stroke-width="1"/>
  <line x1="68" y1="220" x2="159" y2="137" stroke="#aaa" stroke-width="1"/>
  <line x1="68" y1="220" x2="159" y2="190" stroke="#aaa" stroke-width="1"/>
  <line x1="68" y1="220" x2="159" y2="243" stroke="#aaa" stroke-width="1"/>

  <!-- Hidden→Output edges -->
  <line x1="191" y1="84"  x2="282" y2="155" stroke="#aaa" stroke-width="1"/>
  <line x1="191" y1="137" x2="282" y2="158" stroke="#aaa" stroke-width="1"/>
  <line x1="191" y1="190" x2="282" y2="162" stroke="#aaa" stroke-width="1"/>
  <line x1="191" y1="243" x2="282" y2="165" stroke="#aaa" stroke-width="1"/>

  <!-- Layer labels -->
  <text x="52"  y="272" text-anchor="middle" font-family="Arial" font-size="10" fill="#777">Input</text>
  <text x="175" y="272" text-anchor="middle" font-family="Arial" font-size="10" fill="#777">Hidden</text>
  <text x="298" y="272" text-anchor="middle" font-family="Arial" font-size="10" fill="#777">Output</text>

  <!-- ===== DIVIDER ===== -->
  <line x1="360" y1="40" x2="360" y2="280" stroke="#ccc" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- ===== RIGHT: Dropout Network ===== -->
  <text x="545" y="46" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#333">Network with Dropout (p = 0.5)</text>

  <!-- Input layer -->
  <circle cx="420" cy="100" r="16" fill="#fff" stroke="#555" stroke-width="1.8"/>
  <text x="420" y="105" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">x₁</text>
  <circle cx="420" cy="160" r="16" fill="#fff" stroke="#555" stroke-width="1.8"/>
  <text x="420" y="165" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">x₂</text>
  <circle cx="420" cy="220" r="16" fill="#fff" stroke="#555" stroke-width="1.8"/>
  <text x="420" y="225" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">x₃</text>

  <!-- Hidden: h1 and h3 active, h2 and h4 dropped -->
  <circle cx="543" cy="80"  r="16" fill="#bbdefb" stroke="#1976d2" stroke-width="1.8"/>
  <text x="543" y="85"  text-anchor="middle" font-family="Arial" font-size="11" fill="#1a237e">h₁</text>

  <!-- h2 dropped: grey X -->
  <circle cx="543" cy="133" r="16" fill="#f5f5f5" stroke="#bbb" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="543" y="138" text-anchor="middle" font-family="Arial" font-size="13" fill="#bbb">✕</text>

  <circle cx="543" cy="186" r="16" fill="#bbdefb" stroke="#1976d2" stroke-width="1.8"/>
  <text x="543" y="191" text-anchor="middle" font-family="Arial" font-size="11" fill="#1a237e">h₃</text>

  <!-- h4 dropped -->
  <circle cx="543" cy="240" r="16" fill="#f5f5f5" stroke="#bbb" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="543" y="245" text-anchor="middle" font-family="Arial" font-size="13" fill="#bbb">✕</text>

  <!-- Output -->
  <circle cx="666" cy="160" r="16" fill="#c8e6c9" stroke="#388e3c" stroke-width="1.8"/>
  <text x="666" y="165" text-anchor="middle" font-family="Arial" font-size="11" fill="#1b5e20">y</text>

  <!-- Input→Hidden: only connect to active neurons -->
  <line x1="436" y1="100" x2="527" y2="84"  stroke="#aaa" stroke-width="1"/>
  <line x1="436" y1="100" x2="527" y2="190" stroke="#aaa" stroke-width="1"/>
  <line x1="436" y1="160" x2="527" y2="84"  stroke="#aaa" stroke-width="1"/>
  <line x1="436" y1="160" x2="527" y2="190" stroke="#aaa" stroke-width="1"/>
  <line x1="436" y1="220" x2="527" y2="84"  stroke="#aaa" stroke-width="1"/>
  <line x1="436" y1="220" x2="527" y2="190" stroke="#aaa" stroke-width="1"/>

  <!-- Hidden→Output: only active neurons -->
  <line x1="559" y1="84"  x2="650" y2="157" stroke="#aaa" stroke-width="1"/>
  <line x1="559" y1="190" x2="650" y2="162" stroke="#aaa" stroke-width="1"/>

  <!-- Layer labels -->
  <text x="420" y="272" text-anchor="middle" font-family="Arial" font-size="10" fill="#777">Input</text>
  <text x="543" y="272" text-anchor="middle" font-family="Arial" font-size="10" fill="#777">Hidden</text>
  <text x="666" y="272" text-anchor="middle" font-family="Arial" font-size="10" fill="#777">Output</text>

  <!-- Legend -->
  <circle cx="390" cy="292" r="7" fill="#bbdefb" stroke="#1976d2" stroke-width="1.5"/>
  <text x="402" y="296" font-family="Arial" font-size="11" fill="#444">Active neuron</text>
  <circle cx="530" cy="292" r="7" fill="#f5f5f5" stroke="#bbb" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="542" y="296" font-family="Arial" font-size="11" fill="#aaa">Dropped neuron (zeroed)</text>
</svg>
