<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 310" width="740" height="310">
  <defs>
    <marker id="ab" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#89b4fa"/>
    </marker>
    <marker id="ao" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#fab387"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="740" height="310" fill="#1e1e2e" rx="10"/>

  <!-- Divider -->
  <line x1="370" y1="10" x2="370" y2="300" stroke="#313244" stroke-width="1.5"/>

  <!-- Titles -->
  <text x="185" y="26" text-anchor="middle" fill="#89b4fa" font-family="monospace" font-size="14" font-weight="bold">CBOW</text>
  <text x="185" y="42" text-anchor="middle" fill="#585b70" font-family="monospace" font-size="10">context → center word</text>
  <text x="555" y="26" text-anchor="middle" fill="#fab387" font-family="monospace" font-size="14" font-weight="bold">Skip-Gram</text>
  <text x="555" y="42" text-anchor="middle" fill="#585b70" font-family="monospace" font-size="10">center word → context</text>

  <!-- ═══════════ CBOW (left side) ═══════════ -->

  <!-- Context input boxes -->
  <rect x="22"  y="62"  width="78" height="28" rx="5" fill="#313244" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="61" y="80" text-anchor="middle" fill="#89b4fa" font-family="monospace" font-size="11">w_{t-2}</text>

  <rect x="22"  y="108" width="78" height="28" rx="5" fill="#313244" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="61" y="126" text-anchor="middle" fill="#89b4fa" font-family="monospace" font-size="11">w_{t-1}</text>

  <rect x="22"  y="186" width="78" height="28" rx="5" fill="#313244" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="61" y="204" text-anchor="middle" fill="#89b4fa" font-family="monospace" font-size="11">w_{t+1}</text>

  <rect x="22"  y="232" width="78" height="28" rx="5" fill="#313244" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="61" y="250" text-anchor="middle" fill="#89b4fa" font-family="monospace" font-size="11">w_{t+2}</text>

  <text x="61" y="168" text-anchor="middle" fill="#45475a" font-family="monospace" font-size="16">⋮</text>

  <!-- Avg box -->
  <rect x="146" y="148" width="58" height="40" rx="7" fill="#1a2a3a" stroke="#89b4fa" stroke-width="2"/>
  <text x="175" y="165" text-anchor="middle" fill="#89b4fa" font-family="monospace" font-size="11" font-weight="bold">Avg</text>
  <text x="175" y="181" text-anchor="middle" fill="#89b4fa" font-family="monospace" font-size="9">1/2m ∑v</text>

  <!-- Arrows context → avg -->
  <line x1="100" y1="76"  x2="144" y2="158" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#ab)"/>
  <line x1="100" y1="122" x2="144" y2="163" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#ab)"/>
  <line x1="100" y1="200" x2="144" y2="170" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#ab)"/>
  <line x1="100" y1="246" x2="144" y2="175" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#ab)"/>

  <!-- Arrow avg → center word -->
  <line x1="204" y1="168" x2="264" y2="168" stroke="#89b4fa" stroke-width="2" marker-end="url(#ab)"/>

  <!-- Center word prediction (CBOW) -->
  <rect x="266" y="148" width="78" height="40" rx="7" fill="#1e3a26" stroke="#a6e3a1" stroke-width="2"/>
  <text x="305" y="166" text-anchor="middle" fill="#a6e3a1" font-family="monospace" font-size="13" font-weight="bold">w_t</text>
  <text x="305" y="181" text-anchor="middle" fill="#a6e3a1" font-family="monospace" font-size="9">1 prediction</text>

  <!-- Training pairs note (CBOW) -->
  <rect x="78" y="282" width="230" height="20" rx="4" fill="#181825"/>
  <text x="193" y="295" text-anchor="middle" fill="#585b70" font-family="monospace" font-size="10">1 update per window position</text>

  <!-- ═══════════ Skip-Gram (right side) ═══════════ -->

  <!-- Center word input (Skip-Gram) -->
  <rect x="392" y="148" width="78" height="40" rx="7" fill="#3a2e1a" stroke="#fab387" stroke-width="2"/>
  <text x="431" y="166" text-anchor="middle" fill="#fab387" font-family="monospace" font-size="13" font-weight="bold">w_t</text>
  <text x="431" y="181" text-anchor="middle" fill="#fab387" font-family="monospace" font-size="9">center</text>

  <!-- Arrows: center word → context predictions -->
  <line x1="470" y1="158" x2="598" y2="76"  stroke="#fab387" stroke-width="1.5" marker-end="url(#ao)"/>
  <line x1="470" y1="163" x2="598" y2="122" stroke="#fab387" stroke-width="1.5" marker-end="url(#ao)"/>
  <line x1="470" y1="170" x2="598" y2="200" stroke="#fab387" stroke-width="1.5" marker-end="url(#ao)"/>
  <line x1="470" y1="175" x2="598" y2="246" stroke="#fab387" stroke-width="1.5" marker-end="url(#ao)"/>

  <!-- Context prediction boxes (Skip-Gram) -->
  <rect x="600" y="62"  width="118" height="28" rx="5" fill="#313244" stroke="#fab387" stroke-width="1.5"/>
  <text x="659" y="80" text-anchor="middle" fill="#fab387" font-family="monospace" font-size="11">w_{t-2}  ← pred</text>

  <rect x="600" y="108" width="118" height="28" rx="5" fill="#313244" stroke="#fab387" stroke-width="1.5"/>
  <text x="659" y="126" text-anchor="middle" fill="#fab387" font-family="monospace" font-size="11">w_{t-1}  ← pred</text>

  <rect x="600" y="186" width="118" height="28" rx="5" fill="#313244" stroke="#fab387" stroke-width="1.5"/>
  <text x="659" y="204" text-anchor="middle" fill="#fab387" font-family="monospace" font-size="11">w_{t+1}  ← pred</text>

  <rect x="600" y="232" width="118" height="28" rx="5" fill="#313244" stroke="#fab387" stroke-width="1.5"/>
  <text x="659" y="250" text-anchor="middle" fill="#fab387" font-family="monospace" font-size="11">w_{t+2}  ← pred</text>

  <text x="659" y="168" text-anchor="middle" fill="#45475a" font-family="monospace" font-size="16">⋮</text>

  <!-- Training pairs note (Skip-Gram) -->
  <rect x="392" y="282" width="330" height="20" rx="4" fill="#181825"/>
  <text x="557" y="295" text-anchor="middle" fill="#585b70" font-family="monospace" font-size="10">2m updates per window position  (m=2 → 4 here)</text>
</svg>
