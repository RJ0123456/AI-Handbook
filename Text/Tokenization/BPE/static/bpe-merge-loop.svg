<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 420" width="980" height="420" font-family="Segoe UI, Arial, sans-serif">
  <rect width="980" height="420" fill="#161b22"/>

  <text x="490" y="34" text-anchor="middle" fill="#dbe5f0" font-size="20" font-weight="700">BPE Merge Loop</text>
  <text x="490" y="56" text-anchor="middle" fill="#9fb0c3" font-size="13">Repeatedly merge the most frequent adjacent pair to build subword tokens</text>

  <!-- Step 1 -->
  <rect x="40" y="90" width="170" height="210" rx="12" fill="#0f141b" stroke="#304355"/>
  <text x="125" y="116" text-anchor="middle" fill="#8fc7ff" font-size="14" font-weight="700">1. Start</text>
  <rect x="60" y="140" width="130" height="36" rx="8" fill="#1f2a36" stroke="#3e556b"/>
  <text x="125" y="163" text-anchor="middle" fill="#e6edf5" font-size="14">l o w </text>
  <rect x="60" y="186" width="130" height="36" rx="8" fill="#1f2a36" stroke="#3e556b"/>
  <text x="125" y="209" text-anchor="middle" fill="#e6edf5" font-size="14">l o w e r</text>
  <rect x="60" y="232" width="130" height="36" rx="8" fill="#1f2a36" stroke="#3e556b"/>
  <text x="125" y="255" text-anchor="middle" fill="#e6edf5" font-size="14">n e w e s t</text>

  <!-- Step 2 -->
  <rect x="270" y="90" width="170" height="210" rx="12" fill="#0f141b" stroke="#304355"/>
  <text x="355" y="116" text-anchor="middle" fill="#8be9b1" font-size="14" font-weight="700">2. Count pairs</text>
  <rect x="290" y="140" width="130" height="36" rx="8" fill="#1a212b" stroke="#455a70"/>
  <text x="355" y="163" text-anchor="middle" fill="#e6edf5" font-size="14">l + o</text>
  <rect x="290" y="186" width="130" height="36" rx="8" fill="#1a212b" stroke="#455a70"/>
  <text x="355" y="209" text-anchor="middle" fill="#e6edf5" font-size="14">o + w</text>
  <rect x="290" y="232" width="130" height="36" rx="8" fill="#1a212b" stroke="#455a70"/>
  <text x="355" y="255" text-anchor="middle" fill="#e6edf5" font-size="14">e + s</text>
  <text x="355" y="286" text-anchor="middle" fill="#9fb0c3" font-size="11">Choose most frequent pair</text>

  <!-- Arrow 1->2 -->
  <line x1="212" y1="195" x2="264" y2="195" stroke="#7aa2c3" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <rect x="500" y="90" width="170" height="210" rx="12" fill="#0f141b" stroke="#304355"/>
  <text x="585" y="116" text-anchor="middle" fill="#f2cc60" font-size="14" font-weight="700">3. Merge</text>
  <rect x="520" y="140" width="130" height="36" rx="8" fill="#1a212b" stroke="#455a70"/>
  <text x="585" y="163" text-anchor="middle" fill="#e6edf5" font-size="14">l o → lo</text>
  <rect x="520" y="186" width="130" height="36" rx="8" fill="#1a212b" stroke="#455a70"/>
  <text x="585" y="209" text-anchor="middle" fill="#e6edf5" font-size="14">lo w → low</text>
  <rect x="520" y="232" width="130" height="36" rx="8" fill="#1a212b" stroke="#455a70"/>
  <text x="585" y="255" text-anchor="middle" fill="#e6edf5" font-size="14">e s → es</text>
  <text x="585" y="286" text-anchor="middle" fill="#9fb0c3" font-size="11">Save merge rule list</text>

  <!-- Arrow 2->3 -->
  <line x1="442" y1="195" x2="494" y2="195" stroke="#7aa2c3" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4 -->
  <rect x="730" y="90" width="210" height="210" rx="12" fill="#0f141b" stroke="#304355"/>
  <text x="835" y="116" text-anchor="middle" fill="#cba6f7" font-size="14" font-weight="700">4. Tokenize text</text>
  <rect x="750" y="140" width="170" height="36" rx="8" fill="#1a212b" stroke="#455a70"/>
  <text x="835" y="163" text-anchor="middle" fill="#e6edf5" font-size="14">l o w e r</text>
  <rect x="750" y="186" width="170" height="36" rx="8" fill="#1a212b" stroke="#455a70"/>
  <text x="835" y="209" text-anchor="middle" fill="#e6edf5" font-size="14">→ lo w e r</text>
  <rect x="750" y="232" width="170" height="36" rx="8" fill="#1a212b" stroke="#455a70"/>
  <text x="835" y="255" text-anchor="middle" fill="#e6edf5" font-size="14">→ low er</text>
  <text x="835" y="286" text-anchor="middle" fill="#9fb0c3" font-size="11">Apply merges in order</text>

  <!-- Arrow 3->4 -->
  <line x1="672" y1="195" x2="724" y2="195" stroke="#7aa2c3" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Footer -->
  <rect x="160" y="330" width="660" height="58" rx="10" fill="#0f141b" stroke="#304355"/>
  <text x="490" y="353" text-anchor="middle" fill="#dfe8f2" font-size="13">Greedy compression: the most frequent pair gives the largest immediate reduction in token count.</text>
  <text x="490" y="373" text-anchor="middle" fill="#9fb0c3" font-size="12">This is why BPE is fast, deterministic, and practical for subword tokenization.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#7aa2c3"/>
    </marker>
  </defs>
</svg>
