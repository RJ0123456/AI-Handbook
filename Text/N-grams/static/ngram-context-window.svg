<svg xmlns="http://www.w3.org/2000/svg" width="980" height="280" viewBox="0 0 980 280">
  <defs>
    <style>
      .title { font: 700 20px Arial, sans-serif; fill: #1f2937; }
      .label { font: 600 14px Arial, sans-serif; fill: #334155; }
      .tok { font: 600 14px Arial, sans-serif; fill: #0f172a; }
      .small { font: 12px Arial, sans-serif; fill: #475569; }
    </style>
  </defs>

  <text x="20" y="30" class="title">N-gram Context Window (predict next token)</text>

  <text x="20" y="62" class="label">Sentence:</text>
  <rect x="110" y="44" width="70" height="30" rx="6" fill="#e2e8f0"/>
  <text x="145" y="64" text-anchor="middle" class="tok">I</text>
  <rect x="190" y="44" width="70" height="30" rx="6" fill="#e2e8f0"/>
  <text x="225" y="64" text-anchor="middle" class="tok">love</text>
  <rect x="270" y="44" width="70" height="30" rx="6" fill="#e2e8f0"/>
  <text x="305" y="64" text-anchor="middle" class="tok">clean</text>
  <rect x="350" y="44" width="70" height="30" rx="6" fill="#e2e8f0"/>
  <text x="385" y="64" text-anchor="middle" class="tok">NLP</text>
  <rect x="430" y="44" width="70" height="30" rx="6" fill="#fecaca" stroke="#ef4444"/>
  <text x="465" y="64" text-anchor="middle" class="tok">data</text>
  <text x="510" y="64" class="small">(target token)</text>

  <text x="20" y="112" class="label">Unigram (n=1):</text>
  <rect x="170" y="92" width="110" height="32" rx="6" fill="#fde68a" stroke="#f59e0b"/>
  <text x="225" y="113" text-anchor="middle" class="tok">no context</text>
  <text x="300" y="113" class="small">P(data)</text>

  <text x="20" y="162" class="label">Bigram (n=2):</text>
  <rect x="170" y="142" width="70" height="32" rx="6" fill="#bfdbfe" stroke="#2563eb"/>
  <text x="205" y="163" text-anchor="middle" class="tok">NLP</text>
  <text x="255" y="163" class="small">P(data | NLP)</text>

  <text x="20" y="212" class="label">Trigram (n=3):</text>
  <rect x="170" y="192" width="70" height="32" rx="6" fill="#c7d2fe" stroke="#4f46e5"/>
  <text x="205" y="213" text-anchor="middle" class="tok">clean</text>
  <rect x="250" y="192" width="70" height="32" rx="6" fill="#bfdbfe" stroke="#2563eb"/>
  <text x="285" y="213" text-anchor="middle" class="tok">NLP</text>
  <text x="335" y="213" class="small">P(data | clean, NLP)</text>

  <line x1="460" y1="178" x2="460" y2="96" stroke="#9ca3af" stroke-width="2"/>
  <polygon points="460,86 454,96 466,96" fill="#9ca3af"/>
  <text x="478" y="132" class="small">more context</text>
  <text x="478" y="148" class="small">usually better</text>
  <text x="478" y="164" class="small">but sparser</text>
</svg>
