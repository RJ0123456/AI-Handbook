<svg xmlns="http://www.w3.org/2000/svg" width="980" height="300" viewBox="0 0 980 300">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#64748b"/>
    </marker>
    <style>
      .title { font: 700 20px Arial, sans-serif; fill: #1f2937; }
      .label { font: 600 14px Arial, sans-serif; fill: #334155; }
      .small { font: 12px Arial, sans-serif; fill: #475569; }
      .tok { font: 600 13px Arial, sans-serif; fill: #0f172a; }
    </style>
  </defs>

  <text x="20" y="30" class="title">Backoff and Interpolation</text>

  <rect x="60" y="70" width="240" height="80" rx="10" fill="#dbeafe" stroke="#2563eb"/>
  <text x="180" y="98" text-anchor="middle" class="label">Trigram Model</text>
  <text x="180" y="118" text-anchor="middle" class="tok">P3 = P(w_t | w_{t-2}, w_{t-1})</text>

  <rect x="370" y="70" width="240" height="80" rx="10" fill="#dcfce7" stroke="#16a34a"/>
  <text x="490" y="98" text-anchor="middle" class="label">Bigram Model</text>
  <text x="490" y="118" text-anchor="middle" class="tok">P2 = P(w_t | w_{t-1})</text>

  <rect x="680" y="70" width="240" height="80" rx="10" fill="#fef3c7" stroke="#d97706"/>
  <text x="800" y="98" text-anchor="middle" class="label">Unigram Model</text>
  <text x="800" y="118" text-anchor="middle" class="tok">P1 = P(w_t)</text>

  <line x1="180" y1="150" x2="180" y2="205" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="490" y1="150" x2="490" y2="205" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="800" y1="150" x2="800" y2="205" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="210" y="210" width="560" height="70" rx="12" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="490" y="236" text-anchor="middle" class="label">Interpolation Output</text>
  <text x="490" y="258" text-anchor="middle" class="tok">P = lambda3*P3 + lambda2*P2 + lambda1*P1</text>

  <text x="60" y="290" class="small">Backoff idea: if higher-order count is weak or unseen, rely more on lower-order models.</text>
</svg>
