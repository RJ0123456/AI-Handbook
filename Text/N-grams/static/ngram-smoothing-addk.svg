<svg xmlns="http://www.w3.org/2000/svg" width="980" height="320" viewBox="0 0 980 320">
  <defs>
    <style>
      .title { font: 700 20px Arial, sans-serif; fill: #1f2937; }
      .label { font: 600 14px Arial, sans-serif; fill: #334155; }
      .small { font: 12px Arial, sans-serif; fill: #475569; }
      .tok { font: 600 13px Arial, sans-serif; fill: #0f172a; }
    </style>
  </defs>

  <text x="20" y="30" class="title">Add-k Smoothing Intuition</text>
  <text x="20" y="52" class="small">History h = "I"; compare raw counts vs add-k probabilities</text>

  <rect x="30" y="80" width="430" height="190" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="50" y="106" class="label">Without smoothing (MLE)</text>
  <line x1="70" y1="240" x2="420" y2="240" stroke="#94a3b8"/>

  <rect x="110" y="120" width="55" height="120" fill="#60a5fa"/>
  <text x="138" y="114" text-anchor="middle" class="small">2</text>
  <text x="138" y="260" text-anchor="middle" class="tok">love</text>

  <rect x="210" y="170" width="55" height="70" fill="#60a5fa"/>
  <text x="238" y="164" text-anchor="middle" class="small">1</text>
  <text x="238" y="260" text-anchor="middle" class="tok">enjoy</text>

  <rect x="310" y="240" width="55" height="1" fill="#ef4444"/>
  <text x="338" y="224" text-anchor="middle" class="small">0</text>
  <text x="338" y="260" text-anchor="middle" class="tok">pizza</text>
  <text x="300" y="284" class="small">unseen -> zero probability</text>

  <rect x="500" y="80" width="450" height="190" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="520" y="106" class="label">With add-k smoothing</text>
  <line x1="540" y1="240" x2="900" y2="240" stroke="#94a3b8"/>

  <rect x="580" y="136" width="55" height="104" fill="#34d399"/>
  <text x="608" y="130" text-anchor="middle" class="small">(2+k)/(C(h)+k|V|)</text>
  <text x="608" y="260" text-anchor="middle" class="tok">love</text>

  <rect x="700" y="176" width="55" height="64" fill="#34d399"/>
  <text x="728" y="260" text-anchor="middle" class="tok">enjoy</text>

  <rect x="820" y="210" width="55" height="30" fill="#22c55e"/>
  <text x="848" y="260" text-anchor="middle" class="tok">pizza</text>
  <text x="800" y="284" class="small">unseen gets small non-zero mass</text>

  <text x="30" y="306" class="small">Formula: P_add-k(w|h) = (C(h,w)+k) / (C(h)+k|V|)</text>
</svg>
