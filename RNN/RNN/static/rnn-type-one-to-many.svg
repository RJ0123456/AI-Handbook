<svg xmlns="http://www.w3.org/2000/svg" width="210" height="170" viewBox="0 0 210 170">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#666"/>
    </marker>
  </defs>

  <!-- vertical arrows: only x1 feeds hidden (step 1); all hidden -> output -->
  <line x1="45"  y1="135" x2="45"  y2="101" stroke="#666" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="45"  y1="90"  x2="45"  y2="56"  stroke="#666" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="105" y1="90"  x2="105" y2="56"  stroke="#666" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="165" y1="90"  x2="165" y2="56"  stroke="#666" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- recurrent arrows: h1->h2, h2->h3 -->
  <line x1="62"  y1="90" x2="88"  y2="90" stroke="#666" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="122" y1="90" x2="148" y2="90" stroke="#666" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- input: step 1 filled, steps 2-3 dashed (no input) -->
  <rect x="28"  y="124" width="34" height="22" rx="3" fill="#4CAF50"/>
  <text x="45"  y="139" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="white">x&#x2081;</text>
  <rect x="88"  y="124" width="34" height="22" rx="3" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="1.5" stroke-dasharray="3,2"/>
  <rect x="148" y="124" width="34" height="22" rx="3" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- hidden boxes -->
  <rect x="28"  y="79" width="34" height="22" rx="3" fill="#1E88E5"/>
  <text x="45"  y="94" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="white">h&#x2081;</text>
  <rect x="88"  y="79" width="34" height="22" rx="3" fill="#1E88E5"/>
  <text x="105" y="94" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="white">h&#x2082;</text>
  <rect x="148" y="79" width="34" height="22" rx="3" fill="#1E88E5"/>
  <text x="165" y="94" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="white">h&#x2083;</text>

  <!-- output boxes: all steps produce output -->
  <rect x="28"  y="34" width="34" height="22" rx="3" fill="#FB8C00"/>
  <text x="45"  y="49" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="white">y&#x2081;</text>
  <rect x="88"  y="34" width="34" height="22" rx="3" fill="#FB8C00"/>
  <text x="105" y="49" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="white">y&#x2082;</text>
  <rect x="148" y="34" width="34" height="22" rx="3" fill="#FB8C00"/>
  <text x="165" y="49" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="white">y&#x2083;</text>

  <!-- time axis -->
  <line x1="28" y1="160" x2="178" y2="160" stroke="#bbb" stroke-width="1" marker-end="url(#a)"/>
  <text x="184" y="164" font-family="Arial,sans-serif" font-size="10" fill="#aaa">t</text>
</svg>
