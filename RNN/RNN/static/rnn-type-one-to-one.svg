<svg xmlns="http://www.w3.org/2000/svg" width="160" height="170" viewBox="0 0 160 170">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#666"/>
    </marker>
  </defs>

  <!-- arrows (drawn first so boxes paint over endpoints) -->
  <line x1="80" y1="135" x2="80" y2="101" stroke="#666" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="80" y1="90"  x2="80" y2="56"  stroke="#666" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- input box (green) -->
  <rect x="63" y="124" width="34" height="22" rx="3" fill="#4CAF50"/>
  <text x="80" y="139" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="white">x&#x2081;</text>

  <!-- hidden box (blue) -->
  <rect x="63" y="79" width="34" height="22" rx="3" fill="#1E88E5"/>
  <text x="80" y="94" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="white">h&#x2081;</text>

  <!-- output box (orange) -->
  <rect x="63" y="34" width="34" height="22" rx="3" fill="#FB8C00"/>
  <text x="80" y="49" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="white">y&#x2081;</text>

  <!-- row labels -->
  <text x="4" y="139" font-family="Arial,sans-serif" font-size="9" fill="#999">input</text>
  <text x="4" y="94"  font-family="Arial,sans-serif" font-size="9" fill="#999">hidden</text>
  <text x="4" y="49"  font-family="Arial,sans-serif" font-size="9" fill="#999">output</text>
</svg>
