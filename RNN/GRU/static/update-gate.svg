<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340" width="700" height="340" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="700" height="340" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="350" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#212529">Update Gate (z_t) — Behavior</text>
  <text x="350" y="52" text-anchor="middle" font-size="12" fill="#666">Controls: "How much of the new candidate h̃_t replaces the old state h_{t-1}?"</text>

  <!-- ── Columns ───────────────────────────────────── -->

  <!-- Headers -->
  <rect x="40" y="70" width="180" height="38" rx="8" fill="#3a86ff"/>
  <text x="130" y="93" text-anchor="middle" font-size="13" font-weight="bold" fill="white">z_t ≈ 0  (Keep Old)</text>

  <rect x="260" y="70" width="180" height="38" rx="8" fill="#4895ef"/>
  <text x="350" y="93" text-anchor="middle" font-size="13" font-weight="bold" fill="white">z_t ≈ 0.5  (Blend)</text>

  <rect x="480" y="70" width="180" height="38" rx="8" fill="#4361ee"/>
  <text x="570" y="93" text-anchor="middle" font-size="13" font-weight="bold" fill="white">z_t ≈ 1  (Take New)</text>

  <!-- Column 1: z≈0 -->
  <rect x="40" y="125" width="180" height="90" rx="8" fill="white" stroke="#3a86ff" stroke-width="1.5"/>
  <text x="130" y="148" text-anchor="middle" font-size="12" fill="#333">h_t = (1-0)⊙h_{t-1} + 0⊙h̃_t</text>
  <text x="130" y="165" text-anchor="middle" font-size="12" fill="#3a86ff" font-weight="bold">h_t ≈ h_{t-1}</text>
  <text x="130" y="183" text-anchor="middle" font-size="11" fill="#888">Old state preserved</text>
  <text x="130" y="200" text-anchor="middle" font-size="11" fill="#06d6a0" font-weight="bold">∂h_t/∂h_{t-1} ≈ 1  ✓</text>

  <rect x="55" y="230" width="150" height="60" rx="8" fill="#e3f2fd"/>
  <text x="130" y="250" text-anchor="middle" font-size="11" fill="#1565c0" font-weight="bold">When useful:</text>
  <text x="130" y="265" text-anchor="middle" font-size="11" fill="#555">Long-term memory</text>
  <text x="130" y="280" text-anchor="middle" font-size="11" fill="#555">Word meaning preserved</text>

  <!-- Column 2: z≈0.5 -->
  <rect x="260" y="125" width="180" height="90" rx="8" fill="white" stroke="#4895ef" stroke-width="1.5"/>
  <text x="350" y="148" text-anchor="middle" font-size="12" fill="#333">h_t = 0.5⊙h_{t-1} + 0.5⊙h̃_t</text>
  <text x="350" y="165" text-anchor="middle" font-size="12" fill="#4895ef" font-weight="bold">h_t = blend</text>
  <text x="350" y="183" text-anchor="middle" font-size="11" fill="#888">Balanced update</text>
  <text x="350" y="200" text-anchor="middle" font-size="11" fill="#888">∂h_t/∂h_{t-1} ≈ 0.5</text>

  <rect x="275" y="230" width="150" height="60" rx="8" fill="#fff3e0"/>
  <text x="350" y="250" text-anchor="middle" font-size="11" fill="#e65100" font-weight="bold">When useful:</text>
  <text x="350" y="265" text-anchor="middle" font-size="11" fill="#555">General sequence</text>
  <text x="350" y="280" text-anchor="middle" font-size="11" fill="#555">Gradual context shift</text>

  <!-- Column 3: z≈1 -->
  <rect x="480" y="125" width="180" height="90" rx="8" fill="white" stroke="#4361ee" stroke-width="1.5"/>
  <text x="570" y="148" text-anchor="middle" font-size="12" fill="#333">h_t = (1-1)⊙h_{t-1} + 1⊙h̃_t</text>
  <text x="570" y="165" text-anchor="middle" font-size="12" fill="#4361ee" font-weight="bold">h_t ≈ h̃_t</text>
  <text x="570" y="183" text-anchor="middle" font-size="11" fill="#888">Old state discarded</text>
  <text x="570" y="200" text-anchor="middle" font-size="11" fill="#888">∂h_t/∂h_{t-1} ≈ 0</text>

  <rect x="495" y="230" width="150" height="60" rx="8" fill="#fce4ec"/>
  <text x="570" y="250" text-anchor="middle" font-size="11" fill="#c62828" font-weight="bold">When useful:</text>
  <text x="570" y="265" text-anchor="middle" font-size="11" fill="#555">New topic / segment</text>
  <text x="570" y="280" text-anchor="middle" font-size="11" fill="#555">Full memory reset</text>

  <!-- Formula at bottom -->
  <rect x="40" y="305" width="620" height="22" rx="6" fill="#e9ecef"/>
  <text x="350" y="320" text-anchor="middle" font-size="11" fill="#333">Formula:  z_t = σ(W_z x_t + U_z h_{t-1} + b_z)   |   Output:  h_t = (1 − z_t) ⊙ h_{t-1} + z_t ⊙ h̃_t</text>
</svg>
