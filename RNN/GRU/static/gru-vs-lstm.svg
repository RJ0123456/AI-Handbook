<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" width="760" height="420" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="760" height="420" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="380" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#212529">GRU vs LSTM — Architecture Comparison</text>

  <!-- ── Arrow markers ─────────────────────────────── -->
  <defs>
    <marker id="arrD" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
    <marker id="arrR" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e63946"/>
    </marker>
    <marker id="arrB" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4361ee"/>
    </marker>
  </defs>

  <!-- ═══════ LEFT: LSTM ════════════════════════════ -->
  <text x="185" y="62" text-anchor="middle" font-size="15" font-weight="bold" fill="#e63946">LSTM</text>
  <text x="185" y="78" text-anchor="middle" font-size="11" fill="#888">4 transforms · 2 states (h_t, C_t)</text>

  <!-- LSTM outer box -->
  <rect x="40" y="90" width="290" height="270" rx="12" fill="white" stroke="#e63946" stroke-width="2"/>

  <!-- Inputs -->
  <rect x="55" y="115" width="60" height="32" rx="6" fill="#e63946"/>
  <text x="85" y="136" text-anchor="middle" font-size="12" fill="white" font-weight="bold">x_t</text>

  <rect x="55" y="165" width="60" height="32" rx="6" fill="#e63946"/>
  <text x="85" y="186" text-anchor="middle" font-size="12" fill="white" font-weight="bold">h_{t-1}</text>

  <rect x="55" y="215" width="60" height="32" rx="6" fill="#e63946"/>
  <text x="85" y="236" text-anchor="middle" font-size="12" fill="white" font-weight="bold">C_{t-1}</text>

  <!-- LSTM Gates -->
  <rect x="155" y="108" width="80" height="36" rx="8" fill="#ffb3c1" stroke="#e63946" stroke-width="1.5"/>
  <text x="195" y="131" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">Forget f_t</text>

  <rect x="155" y="154" width="80" height="36" rx="8" fill="#ffb3c1" stroke="#e63946" stroke-width="1.5"/>
  <text x="195" y="177" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">Input i_t</text>

  <rect x="155" y="200" width="80" height="36" rx="8" fill="#ffb3c1" stroke="#e63946" stroke-width="1.5"/>
  <text x="195" y="223" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">Cell Gate g_t</text>

  <rect x="155" y="246" width="80" height="36" rx="8" fill="#ffb3c1" stroke="#e63946" stroke-width="1.5"/>
  <text x="195" y="269" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">Output o_t</text>

  <!-- LSTM outputs -->
  <rect x="270" y="154" width="45" height="36" rx="6" fill="#e63946"/>
  <text x="292" y="177" text-anchor="middle" font-size="12" fill="white" font-weight="bold">h_t</text>

  <rect x="270" y="200" width="45" height="36" rx="6" fill="#c1121f"/>
  <text x="292" y="223" text-anchor="middle" font-size="12" fill="white" font-weight="bold">C_t</text>

  <!-- arrows inputs → gates -->
  <line x1="115" y1="131" x2="153" y2="126" stroke="#555" stroke-width="1.5" marker-end="url(#arrD)"/>
  <line x1="115" y1="181" x2="153" y2="172" stroke="#555" stroke-width="1.5" marker-end="url(#arrD)"/>
  <line x1="115" y1="181" x2="153" y2="218" stroke="#555" stroke-width="1.5" marker-end="url(#arrD)"/>
  <line x1="115" y1="231" x2="153" y2="264" stroke="#555" stroke-width="1.5" marker-end="url(#arrD)"/>

  <!-- arrows gates → outputs -->
  <line x1="235" y1="172" x2="268" y2="172" stroke="#e63946" stroke-width="1.5" marker-end="url(#arrR)"/>
  <line x1="235" y1="218" x2="268" y2="218" stroke="#e63946" stroke-width="1.5" marker-end="url(#arrR)"/>

  <!-- LSTM legend inside -->
  <text x="185" y="320" text-anchor="middle" font-size="10" fill="#888">3 gates + cell gate = 4 transforms</text>
  <text x="185" y="336" text-anchor="middle" font-size="10" fill="#888">Separate C_t (cell state) + h_t</text>
  <text x="185" y="352" text-anchor="middle" font-size="10" fill="#888">Parameters: 4(dh + h²)</text>

  <!-- ═══════ RIGHT: GRU ════════════════════════════ -->
  <text x="565" y="62" text-anchor="middle" font-size="15" font-weight="bold" fill="#4361ee">GRU</text>
  <text x="565" y="78" text-anchor="middle" font-size="11" fill="#888">3 transforms · 1 state (h_t)</text>

  <!-- GRU outer box -->
  <rect x="415" y="90" width="290" height="270" rx="12" fill="white" stroke="#4361ee" stroke-width="2"/>

  <!-- Inputs -->
  <rect x="428" y="130" width="60" height="32" rx="6" fill="#4361ee"/>
  <text x="458" y="151" text-anchor="middle" font-size="12" fill="white" font-weight="bold">x_t</text>

  <rect x="428" y="180" width="60" height="32" rx="6" fill="#4361ee"/>
  <text x="458" y="201" text-anchor="middle" font-size="12" fill="white" font-weight="bold">h_{t-1}</text>

  <!-- GRU Gates -->
  <rect x="525" y="123" width="90" height="36" rx="8" fill="#c8d8ff" stroke="#4361ee" stroke-width="1.5"/>
  <text x="570" y="146" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">Reset r_t</text>

  <rect x="525" y="173" width="90" height="36" rx="8" fill="#c8d8ff" stroke="#4361ee" stroke-width="1.5"/>
  <text x="570" y="196" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">Update z_t</text>

  <rect x="525" y="223" width="90" height="36" rx="8" fill="#c8d8ff" stroke="#4361ee" stroke-width="1.5"/>
  <text x="570" y="246" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">Candidate h̃_t</text>

  <!-- GRU output -->
  <rect x="645" y="173" width="45" height="36" rx="6" fill="#4361ee"/>
  <text x="667" y="196" text-anchor="middle" font-size="12" fill="white" font-weight="bold">h_t</text>

  <!-- arrows inputs → gates -->
  <line x1="488" y1="146" x2="523" y2="141" stroke="#555" stroke-width="1.5" marker-end="url(#arrD)"/>
  <line x1="488" y1="196" x2="523" y2="191" stroke="#555" stroke-width="1.5" marker-end="url(#arrD)"/>
  <line x1="488" y1="196" x2="523" y2="241" stroke="#555" stroke-width="1.5" marker-end="url(#arrD)"/>

  <!-- arrows gates → output -->
  <line x1="615" y1="191" x2="643" y2="191" stroke="#4361ee" stroke-width="1.5" marker-end="url(#arrB)"/>

  <!-- GRU legend inside -->
  <text x="565" y="296" text-anchor="middle" font-size="10" fill="#888">2 gates + candidate = 3 transforms</text>
  <text x="565" y="312" text-anchor="middle" font-size="10" fill="#888">Only h_t — no separate cell state</text>
  <text x="565" y="328" text-anchor="middle" font-size="10" fill="#888">Parameters: 3(dh + h²)  ← 25% less</text>

  <!-- ── VS divider ─────────────────────────────────── -->
  <text x="380" y="230" text-anchor="middle" font-size="20" font-weight="bold" fill="#ccc">VS</text>

  <!-- ── Bottom summary bar ─────────────────────────── -->
  <rect x="40" y="375" width="680" height="32" rx="8" fill="#e9ecef"/>
  <text x="380" y="396" text-anchor="middle" font-size="12" fill="#333">GRU: simpler, fewer params, no cell state — LSTM: richer memory, separate cell state, more expressive</text>
</svg>
