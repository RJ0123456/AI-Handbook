<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" width="720" height="360" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="720" height="360" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="360" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#212529">Vanishing Gradient: RNN vs GRU</text>
  <text x="360" y="52" text-anchor="middle" font-size="12" fill="#666">Relative gradient magnitude propagating backward through T time steps</text>

  <!-- ── Axes ───────────────────────────────────────── -->
  <!-- Y axis -->
  <line x1="80" y1="70" x2="80" y2="290" stroke="#555" stroke-width="1.5"/>
  <!-- X axis -->
  <line x1="80" y1="290" x2="660" y2="290" stroke="#555" stroke-width="1.5"/>

  <!-- Y axis label -->
  <text x="22" y="185" text-anchor="middle" font-size="12" fill="#555" transform="rotate(-90, 22, 185)">Gradient Magnitude</text>
  <!-- X axis label -->
  <text x="370" y="320" text-anchor="middle" font-size="12" fill="#555">Time steps back from current</text>

  <!-- Y axis ticks & labels -->
  <line x1="75" y1="290" x2="80" y2="290" stroke="#555" stroke-width="1"/>
  <text x="68" y="294" text-anchor="end" font-size="10" fill="#555">0.0</text>

  <line x1="75" y1="235" x2="80" y2="235" stroke="#555" stroke-width="1"/>
  <text x="68" y="239" text-anchor="end" font-size="10" fill="#555">0.25</text>

  <line x1="75" y1="180" x2="80" y2="180" stroke="#555" stroke-width="1"/>
  <text x="68" y="184" text-anchor="end" font-size="10" fill="#555">0.50</text>

  <line x1="75" y1="125" x2="80" y2="125" stroke="#555" stroke-width="1"/>
  <text x="68" y="129" text-anchor="end" font-size="10" fill="#555">0.75</text>

  <line x1="75" y1="70" x2="80" y2="70" stroke="#555" stroke-width="1"/>
  <text x="68" y="74" text-anchor="end" font-size="10" fill="#555">1.00</text>

  <!-- X axis ticks & labels (0, 5, 10, 15, 20) -->
  <!-- T=0 → x=80, T=5 → x=80+5*57.6=368, T=20 → x=660 -->
  <!-- scale: 580/20 = 29 px per step -->
  <line x1="80"  y1="290" x2="80"  y2="295" stroke="#555" stroke-width="1"/>
  <text x="80"  y="307" text-anchor="middle" font-size="10" fill="#555">0</text>
  <line x1="225" y1="290" x2="225" y2="295" stroke="#555" stroke-width="1"/>
  <text x="225" y="307" text-anchor="middle" font-size="10" fill="#555">5</text>
  <line x1="370" y1="290" x2="370" y2="295" stroke="#555" stroke-width="1"/>
  <text x="370" y="307" text-anchor="middle" font-size="10" fill="#555">10</text>
  <line x1="515" y1="290" x2="515" y2="295" stroke="#555" stroke-width="1"/>
  <text x="515" y="307" text-anchor="middle" font-size="10" fill="#555">15</text>
  <line x1="660" y1="290" x2="660" y2="295" stroke="#555" stroke-width="1"/>
  <text x="660" y="307" text-anchor="middle" font-size="10" fill="#555">20</text>

  <!-- Grid lines (light) -->
  <line x1="80" y1="235" x2="660" y2="235" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="80" y1="180" x2="660" y2="180" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="80" y1="125" x2="660" y2="125" stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="80" y1="70"  x2="660" y2="70"  stroke="#ddd" stroke-width="1" stroke-dasharray="4,4"/>

  <!--
    Scale: y = 290 - grad * 220   (grad in [0,1])
    X: x = 80 + step * 29

    RNN gradient: decays rapidly ~0.7^step
      step 0: 1.0  → y=70
      step 1: 0.7  → y=136
      step 2: 0.49 → y=182
      step 3: 0.34 → y=215
      step 5: 0.17 → y=253
      step 7: 0.08 → y=272
      step 10:0.03 → y=283
      step 15:0.005→ y=289
      step 20:~0   → y=290

    GRU gradient: decays slowly ~0.98^step
      step 0: 1.0  → y=70
      step 5: 0.90 → y=92
      step 10:0.82 → y=110
      step 15:0.74 → y=127
      step 20:0.67 → y=143
  -->

  <!-- RNN curve (red, dashed) -->
  <polyline
    points="80,70 109,136 138,182 167,215 196,237 225,253 254,265 283,272 312,277 341,280 370,283 399,285 428,286 457,287 486,288 515,289 544,289 573,290 602,290 631,290 660,290"
    fill="none" stroke="#e63946" stroke-width="2.5" stroke-dasharray="8,4"/>

  <!-- GRU curve (blue, solid) -->
  <polyline
    points="80,70 109,84 138,98 167,110 196,121 225,132 254,142 283,151 312,160 341,168 370,176 399,183 428,190 457,196 486,202 515,208 544,213 573,218 602,223 631,227 660,232"
    fill="none" stroke="#4361ee" stroke-width="2.5"/>

  <!-- Labels on curves -->
  <text x="460" y="278" font-size="12" fill="#e63946" font-weight="bold">Vanilla RNN</text>
  <text x="460" y="292" font-size="11" fill="#e63946">(gradient vanishes)</text>

  <text x="430" y="185" font-size="12" fill="#4361ee" font-weight="bold">GRU</text>
  <text x="390" y="198" font-size="11" fill="#4361ee">(gradient preserved)</text>

  <!-- Data point markers for RNN -->
  <circle cx="80"  cy="70"  r="4" fill="#e63946"/>
  <circle cx="225" cy="253" r="4" fill="#e63946"/>
  <circle cx="370" cy="283" r="4" fill="#e63946"/>
  <circle cx="660" cy="290" r="4" fill="#e63946"/>

  <!-- Data point markers for GRU -->
  <circle cx="80"  cy="70"  r="4" fill="#4361ee"/>
  <circle cx="225" cy="132" r="4" fill="#4361ee"/>
  <circle cx="370" cy="176" r="4" fill="#4361ee"/>
  <circle cx="660" cy="232" r="4" fill="#4361ee"/>

  <!-- Annotation: GRU at T=20 still ≈ 0.67 -->
  <line x1="660" y1="232" x2="660" y2="290" stroke="#4361ee" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="665" y="245" font-size="10" fill="#4361ee">≈0.67</text>

  <!-- Annotation: RNN at T=5 already tiny -->
  <line x1="225" y1="253" x2="225" y2="290" stroke="#e63946" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="230" y="264" font-size="10" fill="#e63946">≈0.17</text>
</svg>
