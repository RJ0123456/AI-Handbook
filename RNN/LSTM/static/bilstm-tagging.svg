    <rect x="430" y="182" width="120" height="50" rx="12" fill="#dff0ff" stroke="#3b82c4" stroke-width="2"/>
    <rect x="590" y="182" width="120" height="50" rx="12" fill="#dff0ff" stroke="#3b82c4" stroke-width="2"/>
    <rect x="750" y="182" width="120" height="50" rx="12" fill="#dff0ff" stroke="#3b82c4" stroke-width="2"/>
    <text x="170" y="204" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#183153">BiLSTM</text>
    <text x="170" y="222" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#183153">context h1</text>
    <text x="330" y="204" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#183153">BiLSTM</text>
    <text x="330" y="222" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#183153">context h2</text>
    <text x="490" y="204" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#183153">BiLSTM</text>
    <text x="490" y="222" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#183153">context h3</text>
    <text x="650" y="204" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#183153">BiLSTM</text>
    <text x="650" y="222" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#183153">context h4</text>
    <text x="810" y="204" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#183153">BiLSTM</text>
    <text x="810" y="222" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#183153">context h5</text>
  </g>

  <g>
    <rect x="110" y="262" width="120" height="38" rx="10" fill="#e3f7e8" stroke="#35925b" stroke-width="2"/>
    <rect x="270" y="262" width="120" height="38" rx="10" fill="#e3f7e8" stroke="#35925b" stroke-width="2"/>
    <rect x="430" y="262" width="120" height="38" rx="10" fill="#e3f7e8" stroke="#35925b" stroke-width="2"/>
