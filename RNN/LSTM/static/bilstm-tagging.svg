    <text x="490" y="286" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#183153">O</text>
    <text x="650" y="286" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#183153">B-ORG</text>
    <text x="810" y="286" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#183153">O</text>
  </g>

  <g stroke="#7b8ea3" stroke-width="2">
    <line x1="170" y1="146" x2="170" y2="182"/>
    <line x1="330" y1="146" x2="330" y2="182"/>
    <line x1="490" y1="146" x2="490" y2="182"/>
    <line x1="650" y1="146" x2="650" y2="182"/>
    <line x1="810" y1="146" x2="810" y2="182"/>
    <line x1="170" y1="232" x2="170" y2="262"/>
    <line x1="330" y1="232" x2="330" y2="262"/>
    <line x1="490" y1="232" x2="490" y2="262"/>
    <line x1="650" y1="232" x2="650" y2="262"/>
