<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="320" viewBox="0 0 1000 320">
  <rect width="1000" height="320" fill="#faf6ef"/>
  <text x="500" y="35" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#183153">BiLSTM for Sequence Labeling</text>
  <text x="500" y="62" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#52657a">Each token gets a context-rich representation, then predicts its own label</text>

  <g>
    <rect x="110" y="100" width="120" height="46" rx="10" fill="#fff" stroke="#cc8b3c" stroke-width="2"/>
    <rect x="270" y="100" width="120" height="46" rx="10" fill="#fff" stroke="#cc8b3c" stroke-width="2"/>
    <rect x="430" y="100" width="120" height="46" rx="10" fill="#fff" stroke="#cc8b3c" stroke-width="2"/>
    <rect x="590" y="100" width="120" height="46" rx="10" fill="#fff" stroke="#cc8b3c" stroke-width="2"/>
    <rect x="750" y="100" width="120" height="46" rx="10" fill="#fff" stroke="#cc8b3c" stroke-width="2"/>
    <text x="170" y="129" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#183153">John</text>
    <text x="330" y="129" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#183153">works</text>
    <text x="490" y="129" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#183153">at</text>
    <text x="650" y="129" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#183153">Google</text>
    <text x="810" y="129" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#183153">.</text>
  </g>

  <g>
    <rect x="110" y="182" width="120" height="50" rx="12" fill="#dff0ff" stroke="#3b82c4" stroke-width="2"/>
