<svg xmlns="http://www.w3.org/2000/svg" width="720" height="260" viewBox="0 0 720 260" font-family="Consolas, monospace" font-size="14">
  <!-- Background -->
  <rect width="720" height="260" fill="#1e1e2e" rx="12"/>

  <!-- Title -->
  <text x="360" y="30" text-anchor="middle" fill="#cdd6f4" font-size="16" font-weight="bold">Lateral Connection Detail</text>

  <!-- ── C_k branch (top) ── -->
  <!-- C_k box -->
  <rect x="30" y="60" width="90" height="44" rx="8" fill="#313244" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="75" y="86" text-anchor="middle" fill="#89b4fa" font-weight="bold">C_k</text>
  <text x="75" y="100" text-anchor="middle" fill="#a6adc8" font-size="11">(c_k ch.)</text>

  <!-- arrow C_k → 1x1 -->
  <line x1="120" y1="82" x2="175" y2="82" stroke="#cdd6f4" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 1×1 conv box -->
  <rect x="175" y="60" width="110" height="44" rx="8" fill="#313244" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="230" y="83" text-anchor="middle" fill="#a6e3a1" font-weight="bold">1×1 Conv</text>
  <text x="230" y="98" text-anchor="middle" fill="#a6adc8" font-size="11">→ 256 ch.</text>

  <!-- arrow 1x1 → add -->
  <line x1="285" y1="82" x2="350" y2="82" stroke="#cdd6f4" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- vertical line down from 1x1 to add -->
  <line x1="365" y1="82" x2="365" y2="130" stroke="#cdd6f4" stroke-width="1.5"/>

  <!-- ── M_{k+1} branch (bottom) ── -->
  <!-- M_{k+1} box -->
  <rect x="30" y="160" width="110" height="44" rx="8" fill="#313244" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="85" y="183" text-anchor="middle" fill="#89b4fa" font-weight="bold">M_{k+1}</text>
  <text x="85" y="198" text-anchor="middle" fill="#a6adc8" font-size="11">(256 ch.)</text>

  <!-- arrow M_{k+1} → upsample -->
  <line x1="140" y1="182" x2="175" y2="182" stroke="#cdd6f4" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- upsample box -->
  <rect x="175" y="160" width="130" height="44" rx="8" fill="#313244" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="240" y="183" text-anchor="middle" fill="#f38ba8" font-weight="bold">2× Upsample</text>
  <text x="240" y="198" text-anchor="middle" fill="#a6adc8" font-size="11">nearest-neighbour</text>

  <!-- arrow upsample → add (horizontal then up) -->
  <line x1="305" y1="182" x2="365" y2="182" stroke="#cdd6f4" stroke-width="1.5"/>
  <line x1="365" y1="182" x2="365" y2="160" stroke="#cdd6f4" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Add circle ── -->
  <circle cx="365" cy="130" r="20" fill="#313244" stroke="#fab387" stroke-width="2"/>
  <text x="365" y="136" text-anchor="middle" fill="#fab387" font-size="20" font-weight="bold">+</text>

  <!-- arrow add → M_k label -->
  <line x1="385" y1="130" x2="430" y2="130" stroke="#cdd6f4" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="445" y="126" fill="#cdd6f4" font-size="12">M_k</text>

  <!-- arrow M_k → 3x3 -->
  <line x1="468" y1="130" x2="490" y2="130" stroke="#cdd6f4" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 3×3 conv box -->
  <rect x="490" y="108" width="110" height="44" rx="8" fill="#313244" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="545" y="131" text-anchor="middle" fill="#a6e3a1" font-weight="bold">3×3 Conv</text>
  <text x="545" y="146" text-anchor="middle" fill="#a6adc8" font-size="11">256 ch. smooth</text>

  <!-- arrow 3x3 → P_k -->
  <line x1="600" y1="130" x2="650" y2="130" stroke="#cdd6f4" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- P_k box -->
  <rect x="650" y="108" width="55" height="44" rx="8" fill="#45475a" stroke="#cba6f7" stroke-width="2"/>
  <text x="677" y="131" text-anchor="middle" fill="#cba6f7" font-weight="bold">P_k</text>
  <text x="677" y="146" text-anchor="middle" fill="#a6adc8" font-size="11">output</text>

  <!-- Legend -->
  <text x="30" y="240" fill="#6c7086" font-size="12">Blue = feature maps   Green = conv layers   Orange = upsample   Red circle = element-wise add   Purple = pyramid output</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#cdd6f4"/>
    </marker>
  </defs>
</svg>
