<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 290" width="720" height="290">
  <defs>
    <marker id="ah"  markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#89b4fa"/>
    </marker>
    <marker id="apurp" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#cba6f7"/>
    </marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#a6e3a1"/>
    </marker>
    <marker id="ao" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#fab387"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="290" fill="#1e1e2e" rx="10"/>

  <!-- Title -->
  <text x="360" y="26" text-anchor="middle" fill="#cdd6f4"
        font-family="monospace" font-size="14" font-weight="bold">
    Single Internal Node — Binary Decision
  </text>

  <!-- ─── Input: center-word vector ─── -->
  <rect x="22" y="78" width="124" height="48" rx="8" fill="#313244" stroke="#89b4fa" stroke-width="2"/>
  <text x="84" y="97"  text-anchor="middle" fill="#89b4fa" font-family="monospace" font-size="10">center word</text>
  <text x="84" y="116" text-anchor="middle" fill="#89b4fa" font-family="monospace" font-size="13" font-weight="bold">v_wc &#8712; &#8477;&#7496;</text>

  <!-- ─── Input: node vector ─── -->
  <rect x="22" y="162" width="124" height="48" rx="8" fill="#313244" stroke="#cba6f7" stroke-width="2"/>
  <text x="84" y="181" text-anchor="middle" fill="#cba6f7" font-family="monospace" font-size="10">node vector</text>
  <text x="84" y="200" text-anchor="middle" fill="#cba6f7" font-family="monospace" font-size="13" font-weight="bold">v_n &#8712; &#8477;&#7496;</text>

  <!-- ─── Arrows into dot-product ─── -->
  <line x1="146" y1="102" x2="258" y2="137" stroke="#89b4fa"  stroke-width="2" marker-end="url(#ah)"/>
  <line x1="146" y1="186" x2="258" y2="151" stroke="#cba6f7" stroke-width="2" marker-end="url(#apurp)"/>

  <!-- ─── Dot-product circle ─── -->
  <circle cx="278" cy="144" r="24" fill="#313244" stroke="#cdd6f4" stroke-width="2"/>
  <text x="278" y="148" text-anchor="middle" fill="#cdd6f4" font-family="monospace" font-size="18" font-weight="bold">&#183;</text>
  <text x="278" y="162" text-anchor="middle" fill="#6c7086" font-family="monospace" font-size="8">dot</text>

  <!-- ─── Arrow + scalar label ─── -->
  <line x1="302" y1="144" x2="336" y2="144" stroke="#cdd6f4" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="355" y="136" text-anchor="middle" fill="#a6adc8" font-family="monospace" font-size="10">scalar</text>
  <text x="355" y="152" text-anchor="middle" fill="#cdd6f4" font-family="monospace" font-size="12" font-style="italic">v_n&#7488; v_wc</text>

  <!-- ─── Arrow into sigmoid ─── -->
  <line x1="388" y1="144" x2="430" y2="144" stroke="#cdd6f4" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- ─── Sigmoid box ─── -->
  <rect x="432" y="118" width="86" height="52" rx="8" fill="#2a1e3a" stroke="#f38ba8" stroke-width="2"/>
  <text x="475" y="140" text-anchor="middle" fill="#f38ba8" font-family="monospace" font-size="18" font-weight="bold">&#963;(&#183;)</text>
  <text x="475" y="158" text-anchor="middle" fill="#6c7086" font-family="monospace" font-size="9">sigmoid</text>

  <!-- ─── Output arrows ─── -->
  <line x1="518" y1="133" x2="568" y2="104" stroke="#a6e3a1" stroke-width="2" marker-end="url(#ag)"/>
  <line x1="518" y1="155" x2="568" y2="184" stroke="#fab387" stroke-width="2" marker-end="url(#ao)"/>

  <!-- ─── P(left) output box ─── -->
  <rect x="570" y="76"  width="130" height="52" rx="7" fill="#1e3a26" stroke="#a6e3a1" stroke-width="2"/>
  <text x="635" y="95"  text-anchor="middle" fill="#a6e3a1" font-family="monospace" font-size="10">P(left &#124; node)</text>
  <text x="635" y="116" text-anchor="middle" fill="#a6e3a1" font-family="monospace" font-size="12">= &#963;(v_n &#183; v_wc)</text>

  <!-- ─── P(right) output box ─── -->
  <rect x="570" y="160" width="130" height="52" rx="7" fill="#3a2a1e" stroke="#fab387" stroke-width="2"/>
  <text x="635" y="179" text-anchor="middle" fill="#fab387" font-family="monospace" font-size="10">P(right &#124; node)</text>
  <text x="635" y="200" text-anchor="middle" fill="#fab387" font-family="monospace" font-size="12">= &#963;(&#8722;v_n &#183; v_wc)</text>

  <!-- ─── Sum note ─── -->
  <text x="360" y="258" text-anchor="middle" fill="#585b70"
        font-family="monospace" font-size="11">
    P(left) + P(right) = &#963;(x) + &#963;(&#8722;x) = 1  &#10003;
  </text>
</svg>
