<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="460" viewBox="0 0 1100 460" role="img" aria-label="Clipped precision example in BLEU">
  <defs>
    <style>
      .title { font: 700 30px Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .head { font: 700 16px Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .txt { font: 600 15px Segoe UI, Arial, sans-serif; fill: #1e293b; }
      .small { font: 500 13px Segoe UI, Arial, sans-serif; fill: #334155; }
      .ok { fill: #16a34a; }
      .clip { fill: #dc2626; }
    </style>
  </defs>

  <rect x="0" y="0" width="1100" height="460" fill="#f8fafc"/>
  <text x="30" y="44" class="title">Modified Precision: Count Clipping</text>

  <rect x="34" y="78" width="1030" height="340" rx="12" fill="#ffffff" stroke="#cbd5e1"/>

  <text x="66" y="120" class="head">Candidate: the cat the cat on the mat</text>
  <text x="66" y="148" class="head">Reference: the cat is on the mat</text>

  <line x1="66" y1="174" x2="1030" y2="174" stroke="#e2e8f0"/>

  <text x="90" y="208" class="head">token</text>
  <text x="260" y="208" class="head">candidate count</text>
  <text x="500" y="208" class="head">reference max count</text>
  <text x="770" y="208" class="head">clipped match</text>

  <line x1="66" y1="220" x2="1030" y2="220" stroke="#e2e8f0"/>

  <text x="98" y="255" class="txt">the</text>
  <text x="320" y="255" class="txt">3</text>
  <text x="575" y="255" class="txt">2</text>
  <text x="800" y="255" class="txt clip">min(3,2)=2</text>

  <text x="98" y="288" class="txt">cat</text>
  <text x="320" y="288" class="txt">2</text>
  <text x="575" y="288" class="txt">1</text>
  <text x="800" y="288" class="txt clip">min(2,1)=1</text>

  <text x="98" y="321" class="txt">on</text>
  <text x="320" y="321" class="txt">1</text>
  <text x="575" y="321" class="txt">1</text>
  <text x="800" y="321" class="txt ok">min(1,1)=1</text>

  <text x="98" y="354" class="txt">mat</text>
  <text x="320" y="354" class="txt">1</text>
  <text x="575" y="354" class="txt">1</text>
  <text x="800" y="354" class="txt ok">min(1,1)=1</text>

  <line x1="66" y1="372" x2="1030" y2="372" stroke="#e2e8f0"/>
  <text x="90" y="400" class="head">Total clipped matches = 5, total candidate unigrams = 7, so p1 = 5/7</text>

  <text x="66" y="434" class="small">Clipping prevents repeated words from unfairly inflating precision.</text>
</svg>
