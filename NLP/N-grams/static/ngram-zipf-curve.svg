<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-label="Zipf law curve for n-grams">
  <defs>
    <style>
      .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .label { font: 600 16px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .tick { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .note { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #1e293b; }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="980" height="560" fill="url(#bg)"/>
  <text x="36" y="44" class="title">Zipf's Law: Frequency Falls as Rank Increases</text>

  <g transform="translate(90,90)">
    <rect x="0" y="0" width="820" height="390" rx="14" fill="#ffffff" stroke="#cbd5e1"/>

    <line x1="80" y1="320" x2="760" y2="320" stroke="#64748b" stroke-width="2"/>
    <line x1="80" y1="320" x2="80" y2="40" stroke="#64748b" stroke-width="2"/>

    <text x="372" y="360" class="label">rank r (common → rare)</text>
    <text x="-210" y="22" class="label" transform="rotate(-90)">frequency f(r)</text>

    <path d="M 90 70 C 180 150, 260 215, 360 250 C 470 285, 590 305, 740 315"
          fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>

    <circle cx="120" cy="88" r="7" fill="#1d4ed8"/>
    <text x="138" y="92" class="note">High-frequency head</text>

    <circle cx="680" cy="311" r="7" fill="#1d4ed8"/>
    <text x="505" y="286" class="note">Long tail of rare n-grams</text>

    <line x1="520" y1="290" x2="670" y2="308" stroke="#334155" stroke-width="1.5"/>

    <text x="480" y="86" class="note">f(r) ∝ 1 / r^α,  α ≈ 1</text>

    <g class="tick">
      <text x="76" y="338">1</text>
      <text x="228" y="338">10</text>
      <text x="378" y="338">10²</text>
      <text x="528" y="338">10³</text>
      <text x="678" y="338">10⁴</text>

      <text x="46" y="322">10⁰</text>
      <text x="46" y="244">10¹</text>
      <text x="46" y="166">10²</text>
      <text x="46" y="88">10³</text>
    </g>
  </g>
</svg>
