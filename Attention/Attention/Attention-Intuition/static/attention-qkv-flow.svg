<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" width="900" height="360">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#89b4fa"/>
    </marker>
  </defs>

  <rect width="900" height="360" fill="#0f172a" rx="12"/>

  <text x="450" y="32" text-anchor="middle" fill="#e2e8f0" font-size="18" font-family="monospace" font-weight="700">
    Scaled Dot-Product Attention Flow
  </text>

  <rect x="40" y="90" width="120" height="54" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="100" y="112" text-anchor="middle" fill="#bae6fd" font-size="12" font-family="monospace">Input Tokens</text>
  <text x="100" y="130" text-anchor="middle" fill="#bae6fd" font-size="12" font-family="monospace">X (n x d)</text>

  <rect x="220" y="52" width="110" height="44" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="275" y="80" text-anchor="middle" fill="#ddd6fe" font-size="12" font-family="monospace">Q = XWq</text>

  <rect x="220" y="108" width="110" height="44" rx="8" fill="#1e293b" stroke="#f472b6" stroke-width="2"/>
  <text x="275" y="136" text-anchor="middle" fill="#fbcfe8" font-size="12" font-family="monospace">K = XWk</text>

  <rect x="220" y="164" width="110" height="44" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
  <text x="275" y="192" text-anchor="middle" fill="#bbf7d0" font-size="12" font-family="monospace">V = XWv</text>

  <line x1="160" y1="117" x2="220" y2="74" stroke="#89b4fa" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="160" y1="117" x2="220" y2="130" stroke="#89b4fa" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="160" y1="117" x2="220" y2="186" stroke="#89b4fa" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="390" y="88" width="160" height="52" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="470" y="109" text-anchor="middle" fill="#fde68a" font-size="12" font-family="monospace">Scores</text>
  <text x="470" y="127" text-anchor="middle" fill="#fde68a" font-size="12" font-family="monospace">QK^T / sqrt(dk)</text>

  <line x1="330" y1="74" x2="390" y2="108" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="330" y1="130" x2="390" y2="120" stroke="#f472b6" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="600" y="88" width="145" height="52" rx="8" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
  <text x="672" y="109" text-anchor="middle" fill="#a5f3fc" font-size="12" font-family="monospace">Weights</text>
  <text x="672" y="127" text-anchor="middle" fill="#a5f3fc" font-size="12" font-family="monospace">softmax(scores)</text>

  <line x1="550" y1="114" x2="600" y2="114" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="600" y="170" width="145" height="52" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
  <text x="672" y="191" text-anchor="middle" fill="#bbf7d0" font-size="12" font-family="monospace">Context</text>
  <text x="672" y="209" text-anchor="middle" fill="#bbf7d0" font-size="12" font-family="monospace">weights * V</text>

  <line x1="672" y1="140" x2="672" y2="170" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="330" y1="186" x2="600" y2="196" stroke="#34d399" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="780" y="170" width="95" height="52" rx="8" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
  <text x="828" y="191" text-anchor="middle" fill="#bfdbfe" font-size="12" font-family="monospace">Output</text>
  <text x="828" y="209" text-anchor="middle" fill="#bfdbfe" font-size="12" font-family="monospace">(n x dv)</text>

  <line x1="745" y1="196" x2="780" y2="196" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="40" y="264" width="835" height="68" rx="8" fill="#111827" stroke="#334155" stroke-width="1.5"/>
  <text x="58" y="287" fill="#cbd5e1" font-size="12" font-family="monospace">Interpretation:</text>
  <text x="58" y="307" fill="#94a3b8" font-size="12" font-family="monospace">1) Build Q/K/V projections from the same tokens</text>
  <text x="420" y="307" fill="#94a3b8" font-size="12" font-family="monospace">2) Compute relevance scores between tokens</text>
  <text x="58" y="324" fill="#94a3b8" font-size="12" font-family="monospace">3) Normalize scores with softmax</text>
  <text x="320" y="324" fill="#94a3b8" font-size="12" font-family="monospace">4) Mix values using those weights</text>
</svg>
