<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" width="820" height="440">
  <rect width="820" height="440" fill="#0f172a" rx="12"/>

  <text x="410" y="32" text-anchor="middle" fill="#e2e8f0" font-size="18" font-family="monospace" font-weight="700">
    Attention Heatmap (Example Pattern)
  </text>

  <text x="70" y="72" fill="#cbd5e1" font-size="12" font-family="monospace">Rows: Query token</text>
  <text x="250" y="72" fill="#cbd5e1" font-size="12" font-family="monospace">Columns: Key token</text>
  <text x="500" y="72" fill="#94a3b8" font-size="12" font-family="monospace">Brighter = higher attention weight</text>

  <g transform="translate(120,100)">
    <rect x="0" y="0" width="420" height="240" fill="#111827" stroke="#334155" stroke-width="2"/>

    <rect x="0" y="0" width="70" height="60" fill="#fde047"/>
    <rect x="70" y="0" width="70" height="60" fill="#67e8f9"/>
    <rect x="140" y="0" width="70" height="60" fill="#1f2937"/>
    <rect x="210" y="0" width="70" height="60" fill="#1f2937"/>
    <rect x="280" y="0" width="70" height="60" fill="#1f2937"/>
    <rect x="350" y="0" width="70" height="60" fill="#111827"/>

    <rect x="0" y="60" width="70" height="60" fill="#4ade80"/>
    <rect x="70" y="60" width="70" height="60" fill="#fde047"/>
    <rect x="140" y="60" width="70" height="60" fill="#67e8f9"/>
    <rect x="210" y="60" width="70" height="60" fill="#1f2937"/>
    <rect x="280" y="60" width="70" height="60" fill="#111827"/>
    <rect x="350" y="60" width="70" height="60" fill="#111827"/>

    <rect x="0" y="120" width="70" height="60" fill="#111827"/>
    <rect x="70" y="120" width="70" height="60" fill="#4ade80"/>
    <rect x="140" y="120" width="70" height="60" fill="#fde047"/>
    <rect x="210" y="120" width="70" height="60" fill="#67e8f9"/>
    <rect x="280" y="120" width="70" height="60" fill="#1f2937"/>
    <rect x="350" y="120" width="70" height="60" fill="#111827"/>

    <rect x="0" y="180" width="70" height="60" fill="#111827"/>
    <rect x="70" y="180" width="70" height="60" fill="#111827"/>
    <rect x="140" y="180" width="70" height="60" fill="#4ade80"/>
    <rect x="210" y="180" width="70" height="60" fill="#fde047"/>
    <rect x="280" y="180" width="70" height="60" fill="#67e8f9"/>
    <rect x="350" y="180" width="70" height="60" fill="#1f2937"/>

    <line x1="70" y1="0" x2="70" y2="240" stroke="#334155"/>
    <line x1="140" y1="0" x2="140" y2="240" stroke="#334155"/>
    <line x1="210" y1="0" x2="210" y2="240" stroke="#334155"/>
    <line x1="280" y1="0" x2="280" y2="240" stroke="#334155"/>
    <line x1="350" y1="0" x2="350" y2="240" stroke="#334155"/>

    <line x1="0" y1="60" x2="420" y2="60" stroke="#334155"/>
    <line x1="0" y1="120" x2="420" y2="120" stroke="#334155"/>
    <line x1="0" y1="180" x2="420" y2="180" stroke="#334155"/>

    <text x="35" y="-10" text-anchor="middle" fill="#93c5fd" font-size="12" font-family="monospace">The</text>
    <text x="105" y="-10" text-anchor="middle" fill="#93c5fd" font-size="12" font-family="monospace">animal</text>
    <text x="175" y="-10" text-anchor="middle" fill="#93c5fd" font-size="12" font-family="monospace">did</text>
    <text x="245" y="-10" text-anchor="middle" fill="#93c5fd" font-size="12" font-family="monospace">not</text>
    <text x="315" y="-10" text-anchor="middle" fill="#93c5fd" font-size="12" font-family="monospace">cross</text>
    <text x="385" y="-10" text-anchor="middle" fill="#93c5fd" font-size="12" font-family="monospace">it</text>

    <text x="-12" y="34" text-anchor="end" fill="#93c5fd" font-size="12" font-family="monospace">The</text>
    <text x="-12" y="94" text-anchor="end" fill="#93c5fd" font-size="12" font-family="monospace">animal</text>
    <text x="-12" y="154" text-anchor="end" fill="#93c5fd" font-size="12" font-family="monospace">did</text>
    <text x="-12" y="214" text-anchor="end" fill="#93c5fd" font-size="12" font-family="monospace">it</text>
  </g>

  <g transform="translate(575,110)">
    <rect x="0" y="0" width="170" height="210" rx="8" fill="#111827" stroke="#334155"/>
    <text x="85" y="24" text-anchor="middle" fill="#e2e8f0" font-size="12" font-family="monospace">Legend</text>

    <rect x="18" y="42" width="20" height="20" fill="#fde047"/>
    <text x="48" y="56" fill="#cbd5e1" font-size="11" font-family="monospace">Very high</text>

    <rect x="18" y="74" width="20" height="20" fill="#67e8f9"/>
    <text x="48" y="88" fill="#cbd5e1" font-size="11" font-family="monospace">High</text>

    <rect x="18" y="106" width="20" height="20" fill="#4ade80"/>
    <text x="48" y="120" fill="#cbd5e1" font-size="11" font-family="monospace">Medium</text>

    <rect x="18" y="138" width="20" height="20" fill="#1f2937"/>
    <text x="48" y="152" fill="#cbd5e1" font-size="11" font-family="monospace">Low</text>

    <rect x="18" y="170" width="20" height="20" fill="#111827" stroke="#334155"/>
    <text x="48" y="184" fill="#cbd5e1" font-size="11" font-family="monospace">Near zero</text>
  </g>

  <text x="120" y="390" fill="#94a3b8" font-size="12" font-family="monospace">
    Example intuition: near-diagonal brightness captures local syntax; off-diagonal bright spots can capture long-range references.
  </text>
</svg>
