<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560" role="img" aria-labelledby="title desc">
  <title id="title">FFN variants comparison diagram</title>
  <desc id="desc">Compares a classic FFN and a gated SwiGLU style FFN side by side.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 28px 'DejaVu Sans', sans-serif; fill: #0f172a; }
      .section { font: 22px 'DejaVu Sans', sans-serif; fill: #0f172a; }
      .text { font: 17px 'DejaVu Sans', sans-serif; fill: #0f172a; }
      .small { font: 15px 'DejaVu Sans', sans-serif; fill: #334155; }
      .classic { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2.5; rx: 14; }
      .gated { fill: #ede9fe; stroke: #7c3aed; stroke-width: 2.5; rx: 14; }
      .act { fill: #fef3c7; stroke: #d97706; stroke-width: 2.5; rx: 14; }
      .proj { fill: #dcfce7; stroke: #15803d; stroke-width: 2.5; rx: 14; }
      .arrow { stroke: #0f172a; stroke-width: 3; fill: none; marker-end: url(#m); }
      .dashed { stroke: #64748b; stroke-width: 2.5; stroke-dasharray: 8 6; fill: none; marker-end: url(#m2); }
      .line { stroke: #cbd5e1; stroke-width: 2; }
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f172a"/>
    </marker>
    <marker id="m2" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1180" height="560"/>
  <text class="title" x="40" y="52">FFN Variants: Classic vs Gated</text>
  <text class="small" x="40" y="82">Both variants expand hidden size and project back, but gating changes how features are selected and combined.</text>

  <line class="line" x1="590" y1="110" x2="590" y2="520"/>

  <text class="section" x="120" y="135">Classic FFN</text>
  <rect class="classic" x="70" y="180" width="160" height="80"/>
  <text class="text" x="115" y="226">Input x</text>
  <path class="arrow" d="M230 220 L295 220"/>
  <rect class="act" x="295" y="170" width="210" height="100"/>
  <text class="text" x="340" y="210">W1 + activation</text>
  <text class="small" x="335" y="235">ReLU / GELU</text>
  <path class="arrow" d="M505 220 L570 220"/>
  <rect class="proj" x="570" y="180" width="160" height="80"/>
  <text class="text" x="607" y="226">Output y</text>

  <text class="small" x="95" y="315">Formula: W2 φ(W1x + b1) + b2</text>
  <text class="small" x="95" y="345">One expansion path, one activation stream.</text>

  <text class="section" x="740" y="135">Gated FFN</text>
  <rect class="classic" x="650" y="180" width="160" height="80"/>
  <text class="text" x="695" y="226">Input x</text>

  <path class="arrow" d="M810 220 L865 185"/>
  <rect class="act" x="865" y="145" width="220" height="80"/>
  <text class="text" x="922" y="185">Gate branch</text>
  <text class="small" x="918" y="208">Swish / SiLU</text>

  <path class="arrow" d="M810 220 L865 285"/>
  <rect class="classic" x="865" y="245" width="220" height="80"/>
  <text class="text" x="912" y="285">Value branch</text>
  <text class="small" x="913" y="308">linear features</text>

  <path class="arrow" d="M975 225 L975 245"/>
  <circle cx="975" cy="225" r="10" fill="#ffffff" stroke="#0f172a" stroke-width="2"/>
  <text class="text" x="968" y="231">×</text>
  <text class="small" x="995" y="231">elementwise</text>

  <path class="arrow" d="M975 325 L975 365"/>
  <rect class="proj" x="890" y="365" width="170" height="80"/>
  <text class="text" x="930" y="411">Output y</text>

  <text class="small" x="840" y="470">Formula: W2(φ(Wa x) ⊙ (Wb x))</text>
  <text class="small" x="840" y="500">Gate and value streams combine before the final projection.</text>
</svg>
