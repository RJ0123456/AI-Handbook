<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="620" viewBox="0 0 1000 620" role="img" aria-labelledby="title desc">
  <title id="title">Geometric Interpretation of RMSNorm</title>
  <desc id="desc">Vectors are radially rescaled to a fixed-radius sphere while preserving direction.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 28px 'DejaVu Sans', sans-serif; fill: #0f172a; }
      .text { font: 18px 'DejaVu Sans', sans-serif; fill: #334155; }
      .axis { stroke: #64748b; stroke-width: 2; }
      .sphere { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 2.5; }
      .vecRaw { stroke: #b91c1c; stroke-width: 4; fill: none; marker-end: url(#raw); }
      .vecNorm { stroke: #166534; stroke-width: 4; fill: none; marker-end: url(#norm); }
      .dash { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 8 6; fill: none; }
      .origin { fill: #0f172a; }
    </style>
    <marker id="raw" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/>
    </marker>
    <marker id="norm" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#166534"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1000" height="620"/>
  <text class="title" x="36" y="56">RMSNorm Geometric View: Direction Preserved, Radius Fixed</text>

  <line class="axis" x1="120" y1="520" x2="880" y2="520"/>
  <line class="axis" x1="220" y1="560" x2="220" y2="110"/>

  <circle class="sphere" cx="220" cy="520" r="200"/>
  <circle class="origin" cx="220" cy="520" r="6"/>

  <path class="vecRaw" d="M220 520 L470 300"/>
  <path class="vecNorm" d="M220 520 L378 381"/>

  <line class="dash" x1="470" y1="300" x2="378" y2="381"/>

  <text class="text" x="500" y="300">Raw vector x (length varies)</text>
  <text class="text" x="400" y="390">Normalized vector x / RMS(x)</text>
  <text class="text" x="445" y="420">lands on fixed-radius sphere</text>

  <text class="text" x="620" y="170">RMS(x) = ||x||_2 / sqrt(D)</text>
  <text class="text" x="620" y="205">x_tilde = sqrt(D) * x / ||x||_2</text>
  <text class="text" x="620" y="250">Same direction, controlled magnitude.</text>
  <text class="text" x="620" y="280">No mean-centering step.</text>

  <text class="text" x="80" y="592">Blue circle: constant norm target (hypersphere in higher dimensions).</text>
</svg>
