<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 420" width="980" height="420" font-family="Segoe UI, Arial, sans-serif">
  <rect width="980" height="420" fill="#161b22"/>

  <text x="490" y="34" text-anchor="middle" fill="#dbe5f0" font-size="20" font-weight="700">Position Problem: Permutation-Equivariant Attention</text>
  <text x="490" y="56" text-anchor="middle" fill="#9fb0c3" font-size="13">Without positional encoding, reordering inputs mainly reorders outputs.</text>

  <!-- Left input sequence -->
  <rect x="40" y="90" width="390" height="110" rx="12" fill="#0f141b" stroke="#304355"/>
  <text x="62" y="116" fill="#8fc7ff" font-size="14" font-weight="700">Input A</text>
  <rect x="62" y="132" width="100" height="42" rx="8" fill="#1f2a36" stroke="#3e556b"/>
  <rect x="176" y="132" width="100" height="42" rx="8" fill="#1f2a36" stroke="#3e556b"/>
  <rect x="290" y="132" width="118" height="42" rx="8" fill="#1f2a36" stroke="#3e556b"/>
  <text x="112" y="158" text-anchor="middle" fill="#e6edf5" font-size="15">dog</text>
  <text x="226" y="158" text-anchor="middle" fill="#e6edf5" font-size="15">bites</text>
  <text x="349" y="158" text-anchor="middle" fill="#e6edf5" font-size="15">man</text>

  <!-- Right input sequence permuted -->
  <rect x="550" y="90" width="390" height="110" rx="12" fill="#0f141b" stroke="#304355"/>
  <text x="572" y="116" fill="#8fc7ff" font-size="14" font-weight="700">Input B = P(Input A)</text>
  <rect x="572" y="132" width="100" height="42" rx="8" fill="#1f2a36" stroke="#3e556b"/>
  <rect x="686" y="132" width="100" height="42" rx="8" fill="#1f2a36" stroke="#3e556b"/>
  <rect x="800" y="132" width="118" height="42" rx="8" fill="#1f2a36" stroke="#3e556b"/>
  <text x="622" y="158" text-anchor="middle" fill="#e6edf5" font-size="15">man</text>
  <text x="736" y="158" text-anchor="middle" fill="#e6edf5" font-size="15">bites</text>
  <text x="859" y="158" text-anchor="middle" fill="#e6edf5" font-size="15">dog</text>

  <!-- Center formula -->
  <rect x="266" y="224" width="448" height="78" rx="12" fill="#0f141b" stroke="#5a3f73"/>
  <text x="490" y="252" text-anchor="middle" fill="#d9b3ff" font-size="16" font-weight="700">Attn(PX) = P Attn(X)</text>
  <text x="490" y="276" text-anchor="middle" fill="#c8d3e0" font-size="13">Self-attention without positional signal is permutation-equivariant.</text>

  <!-- Output panels -->
  <rect x="40" y="320" width="390" height="74" rx="12" fill="#0f141b" stroke="#2f5f47"/>
  <text x="62" y="346" fill="#8be9b1" font-size="14" font-weight="700">Output for Input A</text>
  <text x="62" y="370" fill="#dfe8f2" font-size="13">[o_dog, o_bites, o_man]</text>

  <rect x="550" y="320" width="390" height="74" rx="12" fill="#0f141b" stroke="#2f5f47"/>
  <text x="572" y="346" fill="#8be9b1" font-size="14" font-weight="700">Output for Input B</text>
  <text x="572" y="370" fill="#dfe8f2" font-size="13">[o_man, o_bites, o_dog] = P(Output A)</text>

  <!-- Arrows -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#7aa2c3"/>
    </marker>
  </defs>
  <line x1="235" y1="200" x2="360" y2="222" stroke="#7aa2c3" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="745" y1="200" x2="620" y2="222" stroke="#7aa2c3" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="235" y1="303" x2="235" y2="318" stroke="#7aa2c3" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="745" y1="303" x2="745" y2="318" stroke="#7aa2c3" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
