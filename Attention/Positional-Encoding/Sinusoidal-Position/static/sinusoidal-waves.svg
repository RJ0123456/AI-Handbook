<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 460" width="980" height="460" font-family="Segoe UI, Arial, sans-serif">
  <rect width="980" height="460" fill="#161b22"/>

  <text x="490" y="34" text-anchor="middle" fill="#dbe5f0" font-size="20" font-weight="700">Sinusoidal Position Encoding</text>
  <text x="490" y="56" text-anchor="middle" fill="#9fb0c3" font-size="13">Different dimensions use different frequencies; shifts correspond to phase rotation.</text>

  <!-- Axes for left chart -->
  <rect x="40" y="86" width="430" height="300" rx="10" fill="#0f141b" stroke="#304355"/>
  <text x="58" y="110" fill="#8fc7ff" font-size="14" font-weight="700">PE(pos, 2i) = sin(omega_i * pos)</text>
  <line x1="70" y1="340" x2="440" y2="340" stroke="#6d7f91"/>
  <line x1="70" y1="140" x2="70" y2="340" stroke="#6d7f91"/>
  <text x="445" y="345" fill="#9fb0c3" font-size="11">pos</text>

  <!-- Sine waves (approx polyline) -->
  <polyline fill="none" stroke="#7ee787" stroke-width="2"
    points="70,240 90,205 110,176 130,158 150,154 170,165 190,188 210,221 230,257 250,290 270,313 290,324 310,320 330,302 350,273 370,238 390,202 410,171 430,157"/>
  <polyline fill="none" stroke="#79c0ff" stroke-width="2"
    points="70,240 90,228 110,216 130,205 150,195 170,186 190,178 210,171 230,165 250,160 270,156 290,154 310,153 330,154 350,156 370,160 390,165 410,171 430,179"/>
  <text x="76" y="160" fill="#7ee787" font-size="11">low i (high freq)</text>
  <text x="76" y="178" fill="#79c0ff" font-size="11">high i (low freq)</text>

  <!-- Right panel: shift rotation relation -->
  <rect x="510" y="86" width="430" height="300" rx="10" fill="#0f141b" stroke="#304355"/>
  <text x="528" y="110" fill="#8fc7ff" font-size="14" font-weight="700">Shift Property (per 2D pair)</text>

  <rect x="540" y="136" width="370" height="60" rx="8" fill="#1a212b" stroke="#455a70"/>
  <text x="725" y="161" text-anchor="middle" fill="#dfe8f2" font-size="15">u(pos) = [sin(omega*pos), cos(omega*pos)]^T</text>
  <text x="725" y="182" text-anchor="middle" fill="#dfe8f2" font-size="14">u(pos+k) = R(omega*k) * u(pos)</text>

  <rect x="540" y="214" width="370" height="148" rx="8" fill="#1a212b" stroke="#455a70"/>
  <text x="725" y="240" text-anchor="middle" fill="#d9b3ff" font-size="14" font-weight="700">R(theta) = [[cos theta, sin theta],[-sin theta, cos theta]]</text>

  <circle cx="620" cy="300" r="42" fill="none" stroke="#5f7489" stroke-width="1.5"/>
  <line x1="620" y1="300" x2="656" y2="278" stroke="#7ee787" stroke-width="3"/>
  <line x1="620" y1="300" x2="592" y2="266" stroke="#79c0ff" stroke-width="3"/>
  <text x="664" y="276" fill="#7ee787" font-size="12">u(pos)</text>
  <text x="560" y="264" fill="#79c0ff" font-size="12">u(pos+k)</text>
  <text x="725" y="300" fill="#dfe8f2" font-size="13">A shift in position becomes</text>
  <text x="725" y="320" fill="#dfe8f2" font-size="13">a rotation in each 2D frequency pair.</text>

  <!-- connector arrow -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#7aa2c3"/>
    </marker>
  </defs>
  <line x1="470" y1="236" x2="508" y2="236" stroke="#7aa2c3" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
